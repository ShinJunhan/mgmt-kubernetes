# values.yaml
# 애플리케이션 기본 설정
appEnv: "development"
replicaCount: 3

# 이미지 설정
image:
  repository: "nginx"
  # tag는 일부러 비워두어 default 함수가 작동하는지 테스트합니다.
  tag: ""
# [추가] 컨테이너 리소스 할당 제한 설정
resources:
  requests:                     # "최소 보장" — 스케줄러가 이만큼 여유 노드에 배치·예약
    cpu: "50m"                  # 50 밀리코어 = 0.05 vCPU (1000m = 1 vCPU)
    memory: "64Mi"              # 64 메비바이트
  limits:                       # "상한선"
    cpu: "200m"                 # 넘으면 CPU는 throttle(느려짐)
    memory: "128Mi"             # 넘으면 메모리는 OOMKilled(강제 종료)